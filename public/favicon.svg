<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07140d"/>
      <stop offset="100%" stop-color="#0c2317"/>
    </linearGradient>
    <linearGradient id="strokeGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#2dd185"/>
    </linearGradient>
    <linearGradient id="strokeGrad2" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#1fae72"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="18" fill="url(#bgGrad)"/>

  <!-- Lower S (drawn first, sits behind at crossing) -->
  <path d="M58 30 C44 30, 34 36, 34 45 C34 54, 44 57, 52 59
           C60 61, 70 65, 70 74 C70 83, 60 89, 46 89
           C38 89, 30 86, 26 81"
        fill="none" stroke="url(#strokeGrad2)" stroke-width="8.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Upper S (drawn on top) -->
  <path d="M44 11 C30 11, 20 17, 20 26 C20 35, 30 38, 38 40
           C46 42, 56 46, 56 55 C56 64, 46 70, 32 70
           C24 70, 16 67, 12 62"
        fill="none" stroke="url(#strokeGrad1)" stroke-width="8.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center connecting node where the two S strokes cross -->
  <circle cx="44.5" cy="44" r="5.2" fill="#d9ad55"/>
</svg>
